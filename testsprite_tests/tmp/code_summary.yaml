version: "2"
type: frontend
tech_stack:
  - Python
  - Streamlit
  - Pandas
  - SQLite
  - Gemini API
routes:
  - path: /
    file: app.py
    auth_required: false
    description: Main Streamlit interface for scraping, matching, and pricing decisions
features:
  - name: Competitor Scraping Pipeline
    description: Scrape competitor sitemaps and product pages with progress and checkpointing
    files:
      - app.py
      - async_scraper.py
    entry_route: /
    user_interactions:
      - Paste or select competitor sitemap/store URLs
      - Click start scraping and analysis
      - Watch live scraping progress and row counters
    api_calls:
      - method: GET
        endpoint: Competitor sitemap and product page URLs
    auth_required: false
  - name: Price Comparison and Decision Workflow
    description: Compare catalog products against competitors and classify actions
    files:
      - app.py
      - engines/engine.py
      - utils/db_manager.py
      - utils/decision_labels.py
    entry_route: /
    user_interactions:
      - Upload own catalog CSV
      - Run analysis and review sections
      - Approve, lower, raise, or defer decisions per product
    api_calls:
      - method: INTERNAL
        endpoint: SQLite data access via utils/db_manager.py
    auth_required: false
  - name: AI-Assisted Verification and Deep Analysis
    description: Use Gemini/OpenRouter-backed checks for reclassification and deep review
    files:
      - app.py
      - engines/ai_engine.py
      - engines/automation.py
      - config.py
    entry_route: /
    user_interactions:
      - Trigger AI review actions and deep analysis buttons
      - Run automatic reclassification for review items
      - Use AI chat and verification utilities
    api_calls:
      - method: POST
        endpoint: Gemini/OpenRouter model APIs
    auth_required: false
known_limitations:
  - issue: No built-in user authentication; app access is open by default
    location: app.py
    impact: Anyone with app URL can use scraping and pricing tools
  - issue: Heavy scraping depends on target site rate limits and anti-bot behavior
    location: async_scraper.py
    impact: Coverage and speed may vary across stores
